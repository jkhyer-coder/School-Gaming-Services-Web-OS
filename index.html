<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Web OS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Desktop Area -->
    <div id="desktop"></div>
    
    <!-- App Store / Launcher (Start Menu) -->
    <div id="start-menu" class="hidden">
        <div class="start-header">App Store / Launcher</div>
        <div id="store-categories"></div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div class="taskbar-icons">
            <div class="taskbar-icon start-btn" id="start-btn" title="Start / App Store">
                <svg viewBox="0 0 24 24" fill="#0078D4" width="24" height="24"><path d="M11.4 11.4H0V0h11.4v11.4zm12.6 0H12.6V0H24v11.4zM11.4 24H0V12.6h11.4V24zm12.6 0H12.6V12.6H24V24z"/></svg>
            </div>
            <div id="running-apps"></div>
        </div>
        <div class="taskbar-time" id="clock">12:00 PM</div>
    </div>

    <!-- Right-Click Context Menu -->
    <div id="context-menu" class="hidden">
        <div class="context-item" id="ctx-open">Open</div>
        <div class="context-item" id="ctx-delete">Delete</div>
    </div>

    <script src="js/vfs.js"></script>
    <script src="js/os.js"></script>
</body>
</html>
